<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Success - EK Metal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-gray-100 text-center space-y-6">
        <div class="w-20 h-20 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center text-4xl mx-auto shadow-inner">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h1 class="text-2xl font-black text-gray-800 tracking-tight">Payment Successful!</h1>
        <p class="text-sm text-gray-500">Thank you for your business. Your order <span class="font-bold text-gray-800">#{{ order_id }}</span> has been received and is now being processed.</p>
        <div class="pt-4 border-t border-gray-100">
            <a href="/" class="block w-full bg-gray-900 text-white py-3 rounded-xl font-bold text-sm hover:bg-amber-600 transition shadow-md">Back to Shop</a>
        </div>
    </div>
</body>
</html>
